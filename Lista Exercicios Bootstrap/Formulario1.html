<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Formulário 1</title>
</head>

<body>

    <div class="container mt-4"> <!-- 1-->
        <h3>Formulário 1</h3>
        <hr>
        <div class="row mb-3"> <!-- 2-->
            <div class="col-md-4"> 
                <label class="form-label">Nome</label>
                <input type="text" class="form-control" placeholder="Ex: Bruno">
                </div>

                <div class="col-md-4">
                <label class="form-label">Sobrenome</label>
                <input type="text" class="form-control" placeholder="Ex: Venturin">
                </div>

                <div class="col-md-4">
                <label class="form-label">Usuário</label>

                <div class="input-group">
                <span class="input-group-text">@</span>
                <input type="text" class="form-control" placeholder="Ex: venturin_bruno">
                </div>
        </div><!-- 2-->
    </div><!-- 1 -->

    <div class="row mb-3"><!-- 3 -->
                <div class="col-md-6">
                <label class="form-label">Cidade</label>
                <input type="text" class="form-control" placeholder="Ex: Parispozino">
                </div>

                <div class="col-md-3">
                <label class="form-label">Estado</label>
                <input type="text" class="form-control" placeholder="Ex: São Paulo">
                </div>

                <div class="col-md-3">
                <label class="form-label">CEP</label>
                <input type="number" class="form-control" placeholder="Ex: 19200000">
                </div>
    </div><!-- 3 -->

    <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox">
                <label class="form-check-label">
                Aceito os termos e condições
                </label>
    </div>

    <button class="btn btn-primary">Enviar formulário</button>

<form>

</body>

</html>

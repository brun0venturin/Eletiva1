<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Formulário 5</title>
</head>
<body class="bg-light">
    <form>
        <div class="container mt-4 mb-5" style="max-width:700px; background-color: rgb(239, 239, 239);"><!--Container-->

            <div class="row mb-3" style="max-width:700px;">
                <h4>Billing address</h4>
            
                <div class="col-md-6"> 
                    <label class="form-label">First name</label> 
                    <input type="text" class="form-control" id="fistname"> 
                </div>
                <div class="col-md-6"> 
                    <label class="form-label">Last name</label> 
                    <input type="text" class="form-control" id="lastname"> 
                </div>

            </div>
            <div class="row mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text">@</span>
                    <input type="text" class="form-control" placeholder="Username">
                </div>    
            </div>

            <div class="mb-3"> 
                <label class="form-label">Email (Optional)</label> 
                <input type="email" class="form-control" placeholder="you@example.com"> 
            </div>

            <div class="mb-3"> 
                <label class="form-label">Address</label> 
                <input type="text" class="form-control" placeholder="1234 Main St"> 
            </div>

            <div class="mb-3"> 
                <label class="form-label">Address 2 (Optional)</label> 
                <input type="text" class="form-control" placeholder="Apartment or suite"> 
            </div>

            <div class="row"> <div class="col-md-5 mb-3"> 
                <label class="form-label">Country</label> 
                <select class="form-select"> 
                    <option>Choose...</option> 
                    <option>Country 1</option> 
                    <option>Country 2</option> 
                </select> 
            </div>

            <div class="col-md-4 mb-3"> 
                <label class="form-label">State</label> 
                <select class="form-select"> 
                    <option>Choose...</option> 
                    <option>State 1</option> 
                    <option>State 2</option> 
                </select> 
            </div>

            <div class="col-md-3 mb-3"> 
                <label class="form-label">Zip</label> 
                <input type="text" class="form-control"> 
            </div>


            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
        </div><!--Container-->
    </form>   
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <title>Formulário 3</title>

    <style>
        .form-control{
        border-color: #6c757d;   
        }
    </style>
</head>
<body>
    <form>
        <h2 class="text-center">Sample Form</h2>

        <div class="container -lg mt-4"> <!--1-->

            <div class="row mb-4"> <!--Primeira Linha-->

                <div class="col-2 d-flex align-items-center text-end">
                    <label class="form-label fw-bold w-100">Partner Name</label>
                </div>

                <div class="col-3">
                    <input type="text" class="form-control" id="partnername">
                </div>

                <div class="col-2 d-flex align-items-center text-end">
                    <label class="form-label fw-bold w-100">Partner Email ID</label>
                </div>

                <div class="col-3">
                    <input type="email" class="form-control" id="partnermail">
                </div>

            </div>

            <div class="row mb-4"> <!--Sgunda Linha-->

                <div class="col-2 d-flex align-items-center text-end">
                    <label class="form-label fw-bold w-100">Partner Legal Name</label>
                </div>

                <div class="col-3">
                    <input type="text" class="form-control" id="partnerlegalname">
                </div>

                <div class="col-2 d-flex align-items-center text-end">
                    <label class="form-label fw-bold w-100">Partner Mobile</label>
                </div>

                <div class="col-3">
                    <input type="tel" class="form-control" id="partnermobile">
                </div>

            </div>

            <div class="row mb-4"> <!--Terceira Linha-->

                <div class="col-2 d-flex align-items-center text-end">
                    <label class="form-label fw-bold w-100">Partner Address</label>
                </div>

                <div class="col-8">
                    <textarea class="form-control"  id="floatingTextarea2" style="height: 100px"></textarea>
                </div>

            </div>

            <div class="row mb-4"> <!--Quarta Linha-->

                <div class="col-2 d-flex align-items-center text-end">
                    <label class="form-label fw-bold w-100">Contract Start Date</label>
                </div>

                <div class="col-3">
                    <input type="date" class="form-control" id="startdate">
                </div>

                <div class="col-2 d-flex align-items-center text-end">
                    <label class="form-label fw-bold w-100">Contract Expiry Date</label>
                </div>

                <div class="col-3">
                    <input type="date" class="form-control" id="expirydate">
                </div>

            </div>
            
            <div class="row mb-4"> <!--Quinta Linha-->

                <div class="col-2 d-flex align-items-center text-end">
                    <label class="form-label fw-bold w-100">Minimum Loan Amount</label>
                </div>

                <div class="col-3">
                    <input type="number" class="form-control" id="minimumamount">
                </div>

                <div class="col-2 d-flex align-items-center text-end">
                    <label class="form-label fw-bold w-100">Maximum Loan Amount</label>
                </div>

                <div class="col-3">
                    <input type="number" class="form-control" id="maximumamount">
                </div>

            </div>

            <div class="row mb-4"> <!--Sexta Linha-->

                <div class="col-2 d-flex align-items-center text-end">
                    <label class="form-label fw-bold w-100">Interest Rate</label>
                </div>

                <div class="col-3">
                    <input type="number" class="form-control" id="interestrate">
                </div>

                <div class="col-2 d-flex align-items-center text-end">
                    <label class="form-label fw-bold w-100">Deposit Amount</label>
                </div>

                <div class="col-3">
                    <input type="number" class="form-control" id="depositamount">
                </div>

            </div>

            <div class="row"><!--Linha do Botão-->

                <div class="col-12">
                    <div class="d-flex justify-content-center text-end">
                        <input class="btn btn-primary" type="submit" value="Save">
                    </div>
                </div>
            </div><!--Linha do Botão-->

        </div><!--1-->
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
</body>
</html>

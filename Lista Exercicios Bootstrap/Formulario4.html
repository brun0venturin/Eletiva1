<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Formlário 4</title>

    <style>
        .form-control{
            border-color: #6c757d;   
        }
        .form-select{
            border-color: #6c757d;
        }
    </style>

</head>
<body>
    <form>
        <div class="container mt-4"><!--Container-->

            

            <div class="row ms-5 mb-4"><!--1-->
                <h2>Novo Usuário</h2>

                <div class="col-10">
                    <label class="form-label fw-bold">Nome:</label> 
                    <input type="text" class="form-control" id="nome" placeholder="Informe o Nome">
                </div>

            </div><!--1-->

            <div class="row ms-5 mb-4"><!--2-->

                <div class="col-3">
                    <label class="form-label fw-bold">CPF:</label> 
                    <input type="text" class="form-control" id="cpf" placeholder="Informe o CPF">
                </div>

                <div class="col-5">
                    <label class="form-label fw-bold">Endereco:</label> 
                    <input type="text" class="form-control" id="endereco" placeholder="Informe o Endereço">
                </div>

                <div class="col-2">
                    <label class="form-label fw-bold">Nível:</label>
                    <select class="form-select" aria-label="Default select example">
                    <option selected>---</option>
                    <option value="1">Adm</option>
                    <option value="2">Finan</option>
                    <option value="3">RH</option>
                    </select>
                </div>
            </div><!--2-->

            <div class="row ms-5 mb-4"><!--3-->

                <div class="col-5">
                    <label class="form-label fw-bold">Email:</label> 
                    <input type="email" class="form-control" id="email" placeholder="Informe o Email">
                </div>

                <div class="col-3">
                    <label class="form-label fw-bold">Senha:</label> 
                    <input type="password" class="form-control" id="senha" placeholder="Informe a Senha">
                </div>

                <div class="col-2">
                    <label class="form-label fw-bold">Status:</label>
                    <select class="form-select" aria-label="Default select example">
                    <option selected>---</option>
                    <option value="1">Ativo</option>
                    <option value="2">Desativado</option>
                    </select>
                </div>

            </div><!--3-->

            <div class="row"><!--Linha dos Botões-->

                <div class="col-10">
                    <div class="d-flex justify-content-end gap-2">
                     <input class="btn btn-primary btn btn-success" type="submit" value="Enviar">
                     <input class="btn btn-primary btn btn-light" type="reset" value="Cancelar">
                    </div>
                </div>
            </div><!--Linha dos Botões-->

            
         </div><!--Container-->
    </form>
</html>
